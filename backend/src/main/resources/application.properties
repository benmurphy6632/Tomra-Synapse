spring.application.name=platform-backend
spring.graphql.graphiql.enabled=true
server.port=${PORT:8080}

#H2 database properties
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Edge device JWT for gRPC (Authorization: Bearer <token>, HS256). Match EDGE_GRPC_JWT_SECRET in Python.
edge.grpc.jwt.enabled=true
edge.grpc.jwt.secret=tomra-edge-jwt-dev-secret-min-32b!!