version: "3.8"

services:
  engine:
    build:
      context: .
      dockerfile: classification_engine/Dockerfile
    container_name: tomra-synapse-classification-engine
    command: ["python", "-m", "app.engine_service"]
    env_file:
      - ./classification_engine/.env
    environment:
      CLOUD_HOST: hopper.proxy.rlwy.net
      CLOUD_PORT: 28253
      DEVICE_ID: edge-device-001
      IMAGE_FOLDER: /images
      GRAPHQL_URL: https://tomra-synapse-backend-production.up.railway.app/graphql
      EDGE_GRPC_JWT_ENABLED: "false"
    volumes:
      - ./classification_engine/app/TestImages:/images
    restart: unless-stopped

  classifier:
    build:
      context: .
      dockerfile: classification_engine/Dockerfile
    container_name: tomra-synapse-classifier
    command: ["python", "-m", "app.edge_runner", "--folder", "/images"]
    env_file:
      - ./classification_engine/.env
    environment:
      CLOUD_HOST: hopper.proxy.rlwy.net
      CLOUD_PORT: 28253
      DEVICE_ID: edge-device-001
      IMAGE_FOLDER: /images
      GRAPHQL_URL: https://tomra-synapse-backend-production.up.railway.app/graphql
      EDGE_GRPC_JWT_ENABLED: "false"
    volumes:
      - ./classification_engine/app/TestImages:/images
    restart: "no"
    stop_signal: SIGTERM
    stop_grace_period: 30s